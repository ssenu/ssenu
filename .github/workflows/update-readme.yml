name: Update README

# 언제 실행할지
on:
  schedule:
    - cron: "0 0 * * *"   # 매일 자정(UTC) = 한국 시간 오전 9시
  push:
    branches: [ main ]     # README/스크립트를 푸시할 때
  workflow_dispatch: {}    # Actions 탭에서 수동 실행 버튼

# Action이 README를 커밋할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: 최근 프로젝트 갱신
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_recent.py

      - name: 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: 최근 프로젝트 자동 갱신"
          git push
